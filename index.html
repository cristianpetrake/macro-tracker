.header{background:linear-gradient(135deg,#059669,#0d9488);color:#fff;padding:16px;padding-top:max(16px,env(safe-area-inset-top))}

select,input[type=text],input[type=number],input[type=time]{width:100%;padding:11px;border-radius:10px;border:1px solid #d1d5db;font-size:15px;outline:none;-webkit-appearance:none;background:#fff}
select{background:#ecfdf5;color:#047857;font-weight:600;border-color:#a7f3d0}
input:focus{border-color:#059669;box-shadow:0 0 0 3px rgba(5,150,105,.15)}

.result-item{padding:11px 14px;border-bottom:1px solid #f3f4f6;cursor:pointer}
.result-item:active{background:#ecfdf5}
.result-item:last-child{border-bottom:none}
.result-name{font-size:13px;font-weight:500}
.result-cat{font-size:10px;color:#9ca3af;margin-left:4px}
.result-macros{font-size:10px;color:#6b7280;margin-top:2px}
.blue{color:#3b82f6}.amber{color:#d97706}.red{color:#ef4444}.purple{color:#8b5cf6}
.selected-food{background:#ecfdf5;border:1px solid #a7f3d0;border-radius:12px;padding:14px;margin-top:10px}

.qty-btn.active{background:#059669;color:#fff;border-color:#059669}
.macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin:10px 0}
.macro-box{background:#fff;border-radius:8px;padding:8px 4px;text-align:center;border:1px solid #f3f4f6}
.macro-val{font-size:18px;font-weight:700}
.macro-unit{font-size:9px;color:#9ca3af}
.btn-primary{width:100%;padding:12px;background:#059669;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
.btn-primary:active{background:#047857}
.btn-primary:disabled{background:#9ca3af}
.btn-save{padding:9px 16px;background:#0d9488;color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer}

.meal-item-name{font-size:12px;font-weight:500}

async function initGapi(){
  await new Promise((resolve)=>{gapi.load('client',resolve)});
  await gapi.client.init({apiKey:API_KEY,discoveryDocs:["https://sheets.googleapis.com/$discovery/rest?version=v4","https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"]});
  gapiInited=true;
}

function initGis(onToken){
  tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:(resp)=>{if(resp.error)return;onToken(resp)}});
  gisInited=true;
}

function requestToken(){tokenClient.requestAccessToken()}
function revokeToken(){const token=gapi.client.getToken();if(token){google.accounts.oauth2.revoke(token.access_token);gapi.client.setToken(null)}}

async function findSpreadsheet(){
  const resp=await gapi.client.drive.files.list({q:`appProperties has { key='${APP_PROPERTY}' and value='true' } and mimeType='application/vnd.google-apps.spreadsheet' and trashed=false`,fields:'files(id,name)',pageSize:1});
  return resp.result.files&&resp.result.files[0]?resp.result.files[0].id:null;
}

    const rows=[];
    // Header row
    rows.push({values:["Data","Ora","Tipul Mesei","Ce am mâncat","Cantitate","Notițe","Calorii (kcal)","Proteine (g)","Carbohidrați (g)","Grăsimi (g)","Fasting (ore)"].map(v=>({userEnteredValue:{stringValue:v}}))});
    const daysRo=["Duminică","Luni","Marți","Miercuri","Joi","Vineri","Sâmbătă"];
    for(let d=1;d<=daysInMonth;d++){
      const dt=new Date(YEAR,m-1,d);
      const dayName=daysRo[dt.getDay()];
      const dateStr=`${String(d).padStart(2,'0')}.${String(m).padStart(2,'0')} (${dayName})`;
      for(let mi=0;mi<MEALS.length;mi++){
        const row={values:[]};
        row.values.push({userEnteredValue:{stringValue:mi===0?dateStr:""}});
        for(let c=1;c<11;c++)row.values.push({userEnteredValue:{stringValue:c===2?MEALS[mi]:""}});
        rows.push(row);
      }
      // Total row
      const startR=2+(d-1)*ROWS_PER_DAY+1;
      const endR=startR+8;
      const tRow={values:[
        {userEnteredValue:{stringValue:""}},
        {userEnteredValue:{stringValue:`Total ${dateStr}`}},
        {userEnteredValue:{stringValue:""}},{userEnteredValue:{stringValue:""}},
        {userEnteredValue:{stringValue:""}},{userEnteredValue:{stringValue:""}},
        {userEnteredValue:{formulaValue:`=SUM(G${startR}:G${endR})`}},
        {userEnteredValue:{formulaValue:`=SUM(H${startR}:H${endR})`}},
        {userEnteredValue:{formulaValue:`=SUM(I${startR}:I${endR})`}},
        {userEnteredValue:{formulaValue:`=SUM(J${startR}:J${endR})`}},
        {userEnteredValue:{stringValue:""}},
      ]};
      rows.push(tRow);
      // Separator
      rows.push({values:[{userEnteredValue:{stringValue:""}}]});
    }
    months.push({properties:{title:getSheetName(m)},data:[{startRow:1,startColumn:0,rowData:rows}]});
  }
  // Title row added to first sheet
  const resp=await gapi.client.sheets.spreadsheets.create({resource:{
    properties:{title:"Jurnal Alimentar - Macro Tracker"},
    sheets:months
  }});
  const ssId=resp.result.spreadsheetId;
  // Set app property on the file
  await gapi.client.drive.files.update({fileId:ssId,resource:{appProperties:{[APP_PROPERTY]:"true"}}});
  return ssId;
}

async function readDayData(ssId,month,day){
  const sheet=getSheetName(month);
  const startRow=getMealRow(day,0);
  const endRow=startRow+8;
  const range=`'${sheet}'!A${startRow}:K${endRow+2}`;
  try{
    const resp=await gapi.client.sheets.spreadsheets.values.get({spreadsheetId:ssId,range});
    return resp.result.values||[];
  }catch(e){return[]}
}

async function writeMeal(ssId,month,day,mealIndex,time,foodDesc,quantity,cal,prot,carbs,fat){
  const sheet=getSheetName(month);
  const row=getMealRow(day,mealIndex);
  const range=`'${sheet}'!B${row}:J${row}`;
  await gapi.client.sheets.spreadsheets.values.update({
    spreadsheetId:ssId,range,valueInputOption:"USER_ENTERED",
    resource:{values:[[time,MEALS[mealIndex],foodDesc,quantity,"",cal,prot,carbs,fat]]}
  });
}

async function readFasting(ssId,month,day){
  const sheet=getSheetName(month);
  const row=getTotalRow(day);
  const range=`'${sheet}'!K${row}`;
  try{const resp=await gapi.client.sheets.spreadsheets.values.get({spreadsheetId:ssId,range});return resp.result.values?.[0]?.[0]||null}catch{return null}
}

// ==================== MAIN APP ====================
function App(){
  const[authState,setAuthState]=useState("loading"); // loading|login|ready
  const[user,setUser]=useState(null);
  const[ssId,setSsId]=useState(null);
  const[tab,setTab]=useState("add"); // add|history
  const[status,setStatus]=useState(null);
  const[selectedDate,setSelectedDate]=useState(new Date());
  const[mealIndex,setMealIndex]=useState(0);
  const[mealTime,setMealTime]=useState("");
  const[query,setQuery]=useState("");
  const[selectedFood,setSelectedFood]=useState(null);
  const[grams,setGrams]=useState(100);
  const[meal,setMeal]=useState([]);
  const[saving,setSaving]=useState(false);
  const[dayData,setDayData]=useState([]);
  const[fasting,setFasting]=useState(null);
  const[catFilter,setCatFilter]=useState("");
  const[showBrowse,setShowBrowse]=useState(false);
  const[loadingDay,setLoadingDay]=useState(false);

  const currentMonth=selectedDate.getMonth()+1;
  const currentDay=selectedDate.getDate();
  const dayName=selectedDate.toLocaleDateString("ro-RO",{weekday:"long"});
  const dateLabel=`${currentDay} ${MONTHS_RO[currentMonth]} ${YEAR}`;

  // Auto-set time
  useEffect(()=>{
    const now=new Date();
    setMealTime(`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`);
  },[mealIndex]);

  // Init Google APIs
  useEffect(()=>{
    const init=async()=>{
      try{
        await initGapi();
        initGis(async(resp)=>{
          // Decode JWT to get user info
          const parts=resp.access_token;
          try{
            const userInfo=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:`Bearer ${resp.access_token}`}});
            const data=await userInfo.json();
            setUser({name:data.name,email:data.email,picture:data.picture});
          }catch{}
          // Find or create spreadsheet
          setStatus({type:"ok",msg:"Caut jurnalul în Drive..."});
          let id=await findSpreadsheet();
          if(!id){
            setStatus({type:"ok",msg:"Creez jurnalul alimentar..."});
            id=await createSpreadsheet();
          }
          setSsId(id);
          setStatus(null);
          setAuthState("ready");
        });
        // Check if already have a token
        const token=gapi.client.getToken();
        if(token){setAuthState("ready")}else{setAuthState("login")}
      }catch(e){setAuthState("login")}
    };
    const interval=setInterval(()=>{
      if(typeof google!=='undefined'&&typeof gapi!=='undefined'){
        clearInterval(interval);
        init();
      }
    },100);
    return()=>clearInterval(interval);
  },[]);

  // Load day data when date changes or tab switches
  useEffect(()=>{
    if(authState!=="ready"||!ssId)return;
    if(currentMonth<4||currentMonth>12)return;
    const load=async()=>{
      setLoadingDay(true);
      const data=await readDayData(ssId,currentMonth,currentDay);
      setDayData(data);
      const f=await readFasting(ssId,currentMonth,currentDay);
      setFasting(f);
      setLoadingDay(false);
    };
    load();
  },[authState,ssId,selectedDate,tab]);

  const results=useMemo(()=>{
    if(!query&&!catFilter)return[];
    let filtered=FOODS;
    if(catFilter)filtered=filtered.filter(f=>f.cat===catFilter);
    if(query){const q=query.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");filtered=filtered.filter(f=>f.name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").includes(q))}
    return filtered.slice(0,15);
  },[query,catFilter]);

  const selectFood=(food)=>{setSelectedFood(food);setGrams(100);setQuery(food.name);setShowBrowse(false);setCatFilter("")};
  const addToMeal=()=>{if(!selectedFood)return;const macros=calcMacros(selectedFood,grams);setMeal(prev=>[...prev,{food:selectedFood,grams,macros}]);setSelectedFood(null);setQuery("");setGrams(100)};
  const removeFromMeal=(idx)=>setMeal(prev=>prev.filter((_,i)=>i!==idx));
  const mealTotals=meal.reduce((a,item)=>({calories:a.calories+item.macros.calories,protein:round1(a.protein+item.macros.protein),carbs:round1(a.carbs+item.macros.carbs),fat:round1(a.fat+item.macros.fat)}),{calories:0,protein:0,carbs:0,fat:0});

  const saveMealToSheet=async()=>{
    if(!meal.length||!ssId||!mealTime)return;
    setSaving(true);
    try{
      const foodDesc=meal.map(it=>`${it.food.name} (${it.grams}g)`).join(", ");
      const qty=meal.map(it=>`${it.grams}g`).join(", ");
      await writeMeal(ssId,currentMonth,currentDay,mealIndex,mealTime,foodDesc,qty,
        mealTotals.calories,mealTotals.protein,mealTotals.carbs,mealTotals.fat);
      setStatus({type:"ok",msg:`${MEALS[mealIndex]} salvat!`});
      setMeal([]);
      // Move to next meal type
      if(mealIndex<MEALS.length-1)setMealIndex(mealIndex+1);
      // Refresh day data
      const data=await readDayData(ssId,currentMonth,currentDay);
      setDayData(data);
      setTimeout(()=>setStatus(null),2000);
    }catch(e){
      setStatus({type:"err",msg:"Eroare la salvare: "+e.message});
    }
    setSaving(false);
  };

  const changeDate=(delta)=>{
    const d=new Date(selectedDate);
    d.setDate(d.getDate()+delta);
    if(d.getFullYear()===YEAR&&d.getMonth()>=3&&d.getMonth()<=11)setSelectedDate(d);
  };
  const goToday=()=>setSelectedDate(new Date());
  const handleLogout=()=>{revokeToken();setAuthState("login");setUser(null);setSsId(null)};

  const preview=selectedFood?calcMacros(selectedFood,grams):null;

  // ==================== LOGIN SCREEN ====================
  if(authState==="loading")return(<div className="loading"><div className="spinner"/><div>Se încarcă...</div></div>);
  if(authState==="login")return(
    <div className="login-screen">
      <h1>Macro Tracker</h1>
      <p>Jurnal alimentar cu calcul automat de macronutrienți și intermittent fasting</p>
      <button className="btn-google" onClick={requestToken}>
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Loghează-te cu Google
      </button>
    </div>
  );

  // ==================== MAIN APP ====================
  return(
    <div>
      <div className="header">
        <div className="header-row">
          <div>
            <h1>Macro Tracker</h1>
            <div className="sub">{dateLabel}, {dayName}</div>
          </div>
          {user&&(
            <div className="user-pill">
              {user.picture&&<img src={user.picture} alt=""/>}
              <div>
                <div style={{fontWeight:600,fontSize:11}}>{user.name?.split(' ')[0]}</div>
                <button className="btn-logout" onClick={handleLogout}>Ieși</button>
              </div>
            </div>
          )}
        </div>
      </div>

      <div className="container">
        {status&&<div className={`status-msg ${status.type==="ok"?"status-ok":"status-err"}`}>{status.msg}</div>}

        {/* Tabs */}
        <div className="tab-bar">
          <div className={`tab${tab==="add"?" active":""}`} onClick={()=>setTab("add")}>Adaugă masă</div>
          <div className={`tab${tab==="history"?" active":""}`} onClick={()=>setTab("history")}>Ziua de azi</div>
        </div>

        {/* Date Navigation */}
        <div className="nav-date">
          <button className="nav-btn" onClick={()=>changeDate(-1)}>&lt;</button>
          <div className="current">{currentDay} {MONTHS_RO[currentMonth]}</div>
          <button className="today-btn" onClick={goToday}>Azi</button>
          <button className="nav-btn" onClick={()=>changeDate(1)}>&gt;</button>
        </div>

        {tab==="add"&&(
          <>
            {/* Meal Type + Time */}
            <div className="card">
              <div className="top-row" style={{marginBottom:8}}>
                <select value={mealIndex} onChange={e=>setMealIndex(Number(e.target.value))}>
                  {MEALS.map((m,i)=><option key={i} value={i}>{m}</option>)}
                </select>
                <input type="time" value={mealTime} onChange={e=>setMealTime(e.target.value)} className="time-input" style={{width:100}}/>
              </div>

              {/* Search */}
              <input type="text" value={query} onChange={e=>{setQuery(e.target.value);setSelectedFood(null);setShowBrowse(false);setCatFilter("")}} placeholder="Caută aliment..." />

              <div style={{display:'flex',justifyContent:'flex-end',marginTop:6}}>
                <button className={`btn-browse${showBrowse?" active":""}`} onClick={()=>{setShowBrowse(!showBrowse);setQuery("");setCatFilter("");setSelectedFood(null)}}>
                  {showBrowse?"Închide":"Categorii"}
                </button>
              </div>

              {showBrowse&&!selectedFood&&(
                <div className="cat-pills">
                  {CATEGORIES.map(cat=><button key={cat} className={`cat-pill${catFilter===cat?" active":""}`} onClick={()=>setCatFilter(catFilter===cat?"":cat)}>{cat}</button>)}
                </div>
              )}

              {results.length>0&&!selectedFood&&(
                <div className="results">
                  {results.map((food,i)=>(
                    <div key={i} className="result-item" onClick={()=>selectFood(food)}>
                      <div><span className="result-name">{food.name}</span><span className="result-cat">{food.cat}</span></div>
                      <div className="result-macros">{food.cal} kcal · P <span className="blue">{food.p}g</span> · C <span className="amber">{food.c}g</span> · G <span className="red">{food.f}g</span></div>
                    </div>
                  ))}
                </div>
              )}
              {query&&results.length===0&&!selectedFood&&<div className="no-results">Niciun rezultat</div>}

              {selectedFood&&(
                <div className="selected-food">
                  <div className="flex-between">
                    <div><strong>{selectedFood.name}</strong><span className="result-cat">{selectedFood.cat}</span></div>
                    <button className="remove-btn" onClick={()=>{setSelectedFood(null);setQuery("")}}>&times;</button>
                  </div>
                  <div className="qty-row">
                    <label>Cantitate:</label>
                    <input type="number" value={grams} onChange={e=>setGrams(Math.max(0,Number(e.target.value)))} style={{width:65}}/>
                    <span style={{fontSize:12,color:'#6b7280'}}>g</span>
                    {[25,50,100,150,200,300].map(g=><button key={g} className={`qty-btn${grams===g?" active":""}`} onClick={()=>setGrams(g)}>{g}g</button>)}
                  </div>
                  {preview&&(
                    <div className="macro-grid">
                      <div className="macro-box"><div className="macro-val">{preview.calories}</div><div className="macro-unit">kcal</div></div>
                      <div className="macro-box"><div className="macro-val blue">{preview.protein}g</div><div className="macro-unit">Proteine</div></div>
                      <div className="macro-box"><div className="macro-val amber">{preview.carbs}g</div><div className="macro-unit">Carbs</div></div>
                      <div className="macro-box"><div className="macro-val red">{preview.fat}g</div><div className="macro-unit">Grăsimi</div></div>
                    </div>
                  )}
                  <button className="btn-primary" onClick={addToMeal}>+ Adaugă la masă</button>
                </div>
              )}
            </div>

            {/* Current Meal Composition */}
            {meal.length>0&&(
              <div className="card">
                <div className="flex-between" style={{marginBottom:8}}>
                  <h2>{MEALS[mealIndex]} · {mealTime}</h2>
                </div>
                {meal.map((item,i)=>(
                  <div key={i} className="meal-item">
                    <div><span className="meal-item-name">{item.food.name}</span><span className="meal-item-g">{item.grams}g</span></div>
                    <div className="meal-item-macros">
                      <span>{item.macros.calories}</span>
                      <span className="blue">P{item.macros.protein}</span>
                      <span className="amber">C{item.macros.carbs}</span>
                      <span className="red">G{item.macros.fat}</span>
                      <button className="remove-btn" onClick={()=>removeFromMeal(i)}>&times;</button>
                    </div>
                  </div>
                ))}
                <MacroBar protein={mealTotals.protein} carbs={mealTotals.carbs} fat={mealTotals.fat}/>
                <div className="total-row">
                  <span>Total: {mealTotals.calories} kcal</span>
                  <button className="btn-save" onClick={saveMealToSheet} disabled={saving||!mealTime}>
                    {saving?"Salvez...":"Salvează în Sheet"}
                  </button>
                </div>
              </div>
            )}
          </>
        )}

        {tab==="history"&&(
          <div className="card">
            <div className="flex-between" style={{marginBottom:10}}>
              <h2>Mesele din {currentDay} {MONTHS_RO[currentMonth]}</h2>
              {fasting&&fasting!=="—"&&fasting!==""&&<div className="fasting-badge">⏱ {fasting}h fasting</div>}
            </div>
            {loadingDay?<div className="loading" style={{minHeight:'20vh'}}><div className="spinner"/></div>:(
              <div className="day-meals">
                {dayData.slice(0,9).map((row,i)=>{
                  const food=row?.[3]||"";
                  const time=row?.[1]||"";
                  const cal=row?.[6]||"";
                  if(!food&&!time)return(
                    <div key={i} className="day-meal-row" style={{opacity:.4}}>
                      <div className="day-meal-type">{MEALS[i]}</div>
                      <div className="day-meal-food" style={{fontStyle:'italic'}}>—</div>
                      <div className="day-meal-kcal"></div>
                    </div>
                  );
                  return(
                    <div key={i} className="day-meal-row">
                      <div className="day-meal-type">{MEALS[i]}</div>
                      <div className="day-meal-food">{time?`${time} · `:""}{food}</div>
                      <div className="day-meal-kcal">{cal?`${cal} kcal`:""}</div>
                    </div>
                  );
                })}
                {/* Day total */}
                {dayData[9]&&(
                  <div style={{marginTop:8,padding:'10px 12px',background:'linear-gradient(135deg,#ecfdf5,#f0fdfa)',borderRadius:10}}>
                    <div className="macro-grid">
                      <div className="macro-box"><div className="macro-val">{dayData[9]?.[6]||0}</div><div className="macro-unit">kcal</div></div>
                      <div className="macro-box"><div className="macro-val blue">{dayData[9]?.[7]||0}g</div><div className="macro-unit">Proteine</div></div>
                      <div className="macro-box"><div className="macro-val amber">{dayData[9]?.[8]||0}g</div><div className="macro-unit">Carbs</div></div>
                      <div className="macro-box"><div className="macro-val red">{dayData[9]?.[9]||0}g</div><div className="macro-unit">Grăsimi</div></div>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        <div className="footer">
          Macro Tracker · Datele se salvează în Google Sheets
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
